<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ chart_type }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center">
    <h1 class="text-2xl font-bold mb-6">{{ chart_type }}</h1>
    <img src="data:image/png;base64,{{ chart_img }}" alt="{{ chart_type }}" class="rounded shadow-lg">
    <a href="{{ url_for('chart_suggestions') }}" class="mt-6 px-4 py-2 bg-purple-700 hover:bg-purple-800 rounded font-semibold">← Back to Suggestions</a>
</body>
</html>
